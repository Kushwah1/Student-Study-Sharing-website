<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Notes – StudyShare</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <i class="fas fa-book-open"></i>
        <span>StudyShare</span>
      </a>
      <button class="nav-toggle" id="navToggle">
        <i class="fas fa-bars"></i>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="browse.html" class="nav-link active">Browse Notes</a></li>
        <li id="navDashboard" style="display:none;"><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li id="navAdmin" style="display:none;"><a href="admin.html" class="nav-link">Admin</a></li>
        <li id="navLogin"><a href="login.html" class="nav-link btn-nav">Login</a></li>
        <li id="navSignup"><a href="signup.html" class="nav-link btn-nav btn-nav-outline">Sign Up</a></li>
        <li id="navLogout" style="display:none;">
          <a href="#" class="nav-link btn-nav btn-nav-outline" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- ============================================ -->
  <!-- Browse Notes Section                         -->
  <!-- ============================================ -->
  <section class="browse-section">
    <div class="container">
      <!-- Page header -->
      <div class="page-header">
        <h1><i class="fas fa-book-reader"></i> Browse Notes</h1>
        <p>Discover and download study notes shared by students</p>
      </div>

      <!-- Search and Filter Bar -->
      <div class="search-filter-bar">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search notes by title, subject, or description...">
          <button class="btn btn-primary" id="searchBtn" onclick="searchNotes()">Search</button>
        </div>
        <div class="filter-bar">
          <label>Filter by Subject:</label>
          <select id="subjectFilter" onchange="filterBySubject()">
            <option value="All">All Subjects</option>
            <option value="Mathematics">Mathematics</option>
            <option value="Physics">Physics</option>
            <option value="Chemistry">Chemistry</option>
            <option value="Biology">Biology</option>
            <option value="Computer Science">Computer Science</option>
            <option value="English">English</option>
            <option value="History">History</option>
            <option value="Geography">Geography</option>
            <option value="Economics">Economics</option>
            <option value="Business Studies">Business Studies</option>
            <option value="Accounting">Accounting</option>
            <option value="Psychology">Psychology</option>
            <option value="Sociology">Sociology</option>
            <option value="Political Science">Political Science</option>
            <option value="Engineering">Engineering</option>
            <option value="Medical">Medical</option>
            <option value="Law">Law</option>
            <option value="Arts">Arts</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <!-- Results info -->
      <div class="results-info" id="resultsInfo"></div>

      <!-- Notes Grid -->
      <div class="notes-grid" id="notesGrid">
        <!-- Notes will be dynamically inserted here -->
      </div>

      <!-- Loading spinner -->
      <div class="loading" id="loading" style="display:none;">
        <i class="fas fa-spinner fa-spin fa-3x"></i>
        <p>Loading notes...</p>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <i class="fas fa-folder-open"></i>
        <h3>No Notes Found</h3>
        <p>Try a different search term or browse all subjects.</p>
        <button class="btn btn-primary" onclick="loadAllNotes()">Show All Notes</button>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination"></div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 StudyShare. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
